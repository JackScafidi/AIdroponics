; PlatformIO Configuration for Claudroponics ESP32 Firmware
; Board: ESP32 DevKit V1
; Framework: Arduino + micro-ROS

[env:esp32dev]
platform   = espressif32
board      = esp32dev
framework  = arduino

; Serial monitor / upload
monitor_speed = 115200
upload_speed  = 921600

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3

; Library dependencies
lib_deps =
    ; micro-ROS for Arduino (pre-built static library bundle)
    https://github.com/micro-ROS/micro_ros_arduino.git
    ; OneWire bus driver (DS18B20)
    paulstoffregen/OneWire @ ^2.3.7
    ; DallasTemperature – DS18B20 abstraction
    milesburton/DallasTemperature @ ^3.11.0
    ; HX711 load-cell driver by Bogde
    bogde/HX711 @ ^0.7.5

; Increase partition size – micro-ROS static lib is large
board_build.partitions = huge_app.csv

; Extra scripts (none required, placeholder)
; extra_scripts =
