nutrient_controller:
  ros__parameters:
    # pH PID controller
    ph_pid:
      kp: 2.0
      ki: 0.1
      kd: 0.5
      dead_band: 0.1             # Don't actuate within +/- 0.1 pH
      integral_clamp: 10.0       # Anti-windup limit
      output_min: 0.0            # Minimum pump ms
      output_max: 5000.0         # Maximum pump ms per cycle

    # EC PID controller
    ec_pid:
      kp: 3.0
      ki: 0.2
      kd: 0.3
      dead_band: 0.1             # Don't actuate within +/- 0.1 mS/cm
      integral_clamp: 10.0
      output_min: 0.0
      output_max: 5000.0

    # Pump calibration (mL per second of run time)
    pump_flow_rates:
      ph_up: 1.0                 # mL/s
      ph_down: 1.0
      nutrient_a: 1.5
      nutrient_b: 1.5

    # Minimum dose (mL) — below this, skip
    minimum_dose_ml: 0.1

    # Mixing wait after any dose
    mixing_wait_seconds: 60

    # Control loop rate
    control_rate_hz: 1.0

    # Deficiency response
    deficiency_prevalence_threshold: 0.5   # >50% plants affected triggers response

    # Sensor publish rate
    publish_rate_hz: 1.0
