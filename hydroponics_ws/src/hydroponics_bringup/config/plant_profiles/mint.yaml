name: "Spearmint"
plant_id: "mint"

growth_stages:
  seedling:
    day_range: [0, 14]
    ph_target: 6.0
    ph_tolerance: 0.4
    ec_target: 0.8
    ec_tolerance: 0.2
    a_b_ratio: 1.0
    light_hours: 16
    light_intensity_percent: 50
  vegetative:
    day_range: [15, 35]
    ph_target: 6.0
    ph_tolerance: 0.4
    ec_target: 1.4
    ec_tolerance: 0.3
    a_b_ratio: 1.0
    light_hours: 16
    light_intensity_percent: 75
  mature:
    day_range: [36, 999]
    ph_target: 6.0
    ph_tolerance: 0.4
    ec_target: 1.6
    ec_tolerance: 0.3
    a_b_ratio: 1.0
    light_hours: 14
    light_intensity_percent: 80

light_schedule:
  on_time: "06:00"
  ramp_up_minutes: 30
  ramp_down_minutes: 30

deficiency_response:
  nitrogen:    { a_b_ratio: 1.3, ec_boost: 0.2 }
  phosphorus:  { a_b_ratio: 0.7, ec_boost: 0.1 }
  potassium:   { a_b_ratio: 0.8, ec_boost: 0.15 }
  iron:        { a_b_ratio: 1.0, ec_boost: 0.15 }

harvest:
  maturity_canopy_area_cm2: 90
  min_days_between_cuts: 10
  cut_height_mm: 50
  max_cut_cycles: 5
  regrow_days_expected: 10

temperature:
  target_c: 20
  max_c: 26
  min_c: 13

water_change_interval_days: 12
expected_yield_grams_per_cut: 18
