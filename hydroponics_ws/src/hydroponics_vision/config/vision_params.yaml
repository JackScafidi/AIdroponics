vision_node:
  ros__parameters:
    # Camera device IDs
    overhead_camera_id: 0
    side_camera_id: 2

    # Image capture
    capture_width: 1920
    capture_height: 1080
    capture_format: "MJPG"
    led_stabilize_delay_ms: 200

    # YOLOv8 inference
    model_path: "models/yolov8n-seg-plants.pt"
    confidence_threshold: 0.5
    iou_threshold: 0.45
    inference_size: 640

    # Per-plant ROI coordinates (pixels in 1920x1080 overhead image)
    # Tray at hard stop, plants 0-3 from left to right
    plant_rois:
      - { x: 160, y: 200, w: 400, h: 600 }    # Plant 0
      - { x: 560, y: 200, w: 400, h: 600 }    # Plant 1
      - { x: 960, y: 200, w: 400, h: 600 }    # Plant 2
      - { x: 1360, y: 200, w: 400, h: 600 }   # Plant 3

    # Calibration: pixels to real-world units
    overhead_px_per_cm: 38.0     # At known camera height (~30cm above tray)
    side_px_per_cm: 30.0

    # Health classification labels (must match YOLO training)
    health_classes:
      - "healthy"
      - "nitrogen_deficiency"
      - "phosphorus_deficiency"
      - "potassium_deficiency"
      - "iron_deficiency"
      - "disease_fungal"
      - "disease_bacterial"

    # Maturity classes
    maturity_classes:
      - "immature"
      - "vegetative"
      - "mature"
      - "overmature"
